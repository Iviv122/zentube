<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <link href="./style.css" rel="stylesheet">
</head>

<body>

    <form id="form">
        <h3>General</h3>
        <label>Display Youtube logo top left <input type="checkbox" id="logo"></label>
        <br>
        <label>Display your account top right <input type="checkbox" id="account_info"></label>
        <br>
        <label>Display navigation menu <input type="checkbox" id="left_panel"></label>
        <br>
        <label>Display voice search button<input type="checkbox" id="voice_search"></label>
        <br>
        <label>Display thumbnails<input type="checkbox" id="thumnails"></label>

        <h3>Main page</h3>
        <label>Display videos on main page <input type="checkbox" id="videos_main"></label>

        <h3>Video page</h3>
        <label>Display related videos <input type="checkbox" id="right_panel"></label>
        <br>
        <label>Display comments section<input type="checkbox" id="comments_section"></label>
        <br>
        <label>Display playlist <input type="checkbox" id="playlist"></label>
        <br>
        <label>Display video's author <input type="checkbox" id="video_author"></label>
        <br>
        <label>Display like/dislike button <input type="checkbox" id="like_dislike"></label>
        <br>
        <label>Display save/clip button (yes there are tied) <input type="checkbox" id="clip_save"></label>
        <br>
        <label>Display merch <input type="checkbox" id="merch"></label>
        <br>
        <label>Display Tickets/concerts <input type="checkbox" id="tickets"></label>
        <br>
        <hr>
        <button id="enableall">Enable all</button>
        <button id="disableall">Disable all</button>
        <br>
        <p><em>*Items will appear again after page reload</em></p>
        <p><em>**Shorts are banned and hardcoded to be so</em></p>
    </form>

    <script src="options.js"></script>
</body>

</html>
