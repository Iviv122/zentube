<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <link href="./style.css" rel="stylesheet">
</head>

<body>

    <h2>There are no settings to return shorts in any format </h2>
    <form id="form">
        <label>Display videos on main page<input type="checkbox" id="videos_main"></label>
        <br>
        <label>Display comments section<input type="checkbox" id="comments_section"></label>
        <br>
        <label>Display right panel during video watching<input type="checkbox" id="right_panel"></label>
        <br>
        <label>Display playlist during video watching<input type="checkbox" id="playlist"></label>
        <br>
        <label>Display left menu<input type="checkbox" id="left_panel"></label>
        <br>
        <label>Display Youtube logo<input type="checkbox" id="logo"></label>
        <br>
        <label>Display account top buttons<input type="checkbox" id="account_info"></label>
        <br>
        <label>Display video's author<input type="checkbox" id="video_author"></label>
        <br>
        <label>Show like/dislike button<input type="checkbox" id="like_dislike"></label>
        <br>
        <label>Show merch <input type="checkbox" id="merch"></label>
        <button type="submit">Save</button>
    </form>

    <script src="options.js"></script>
</body>

</html>
